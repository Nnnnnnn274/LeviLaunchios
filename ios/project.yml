name: LeviLauncher
options:
  bundleIdPrefix: com.levimc
  deploymentTarget:
    iOS: "14.0"
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LeviLauncher:
    type: framework
    platform: iOS
    sources:
      - path: LeviLauncher
        type: group
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levimc.levilauncher
        MACH_O_TYPE: mh_dylib
        DYLIB_INSTALL_NAME: "@executable_path/LeviLauncher.dylib"
        EXECUTABLE_PREFIX: ""
        SWIFT_OBJC_BRIDGING_HEADER: LeviLauncher/Native/Bridge/Launcher-Bridging-Header.h
        CLANG_ENABLE_MODULES: YES
        SWIFT_FORCE_STATIC_LINK_STDLIB: NO
        SWIFT_FORCE_DYNAMIC_LINK_STDLIB: YES
        OTHER_LDFLAGS: ["-lz", "-lc++", "-lresolv"]
        ENABLE_BITCODE: NO
        IPHONEOS_DEPLOYMENT_TARGET: "14.0"
    info:
      path: LeviLauncher/Info.plist
    preBuildScripts:
      - name: "Create Config Files"
        script: |
          if [ ! -f "$SRCROOT/LeviLauncher/Resources/CurseForge.plist" ]; then
            cat > "$SRCROOT/LeviLauncher/Resources/CurseForge.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>APIKey</key>
              <string>\$(CURSEFORGE_API_KEY)</string>
          </dict>
          </plist>
          EOF
          fi
