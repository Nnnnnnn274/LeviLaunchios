name: Build Dylib

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/buildipa.yml'
    branches:
      - "**"
    tags:
      - v*
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/buildipa.yml'
  workflow_dispatch:

env:
  PROJECT_DIR: ios
  SCHEME: LeviLauncher
  CONFIGURATION: Release
  SDK: iphoneos

jobs:
  build-dylib:
    name: Build LeviLauncher.dylib
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep -E '^Xcode[._]?[0-9]' | sort -V | tail -1)
          echo "Selected: $XCODE"
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          cd "$PROJECT_DIR"
          xcodegen generate --spec project.yml
          ls -la *.xcodeproj

      - name: Build Dylib
        run: |
          cd "$PROJECT_DIR"
          xcodebuild -project LeviLauncher.xcodeproj \
                     -scheme "$SCHEME" \
                     -configuration "$CONFIGURATION" \
                     -sdk "$SDK" \
                     CODE_SIGNING_ALLOWED=NO \
                     CLANG_ENABLE_MODULE_DEBUGGING=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     build 2>&1

      - name: Locate Built Dylib
        id: dylib
        run: |
          DYLIB=$(find ~/Library/Developer/Xcode/DerivedData \
                    -name "LeviLauncher" \
                    -path "*/$CONFIGURATION-iphoneos/*" \
                    -type f | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: Could not find built dylib"
            find ~/Library/Developer/Xcode/DerivedData -name "LeviLauncher*" 2>/dev/null
            exit 1
          fi
          echo "dylib-path=$DYLIB" >> "$GITHUB_OUTPUT"
          echo "Found: $DYLIB"
          file "$DYLIB"
          lipo -info "$DYLIB"

      - name: Extract Version
        id: version
        run: |
          VERSION=$(cd "$PROJECT_DIR" && \
                    grep "MARKETING_VERSION" project.yml | \
                    head -1 | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION:-1.0.0}" >> "$GITHUB_OUTPUT"

      - name: Package Dylib
        run: |
          mkdir -p dist
          DYLIB="${{ steps.dylib.outputs.dylib-path }}"
          cp "$DYLIB" "dist/LeviLauncher.dylib"
          cd dist
          ls -lh
          zip "LeviLauncher-${{ steps.version.outputs.version }}-ios.zip" LeviLauncher.dylib
          ls -lh

      - name: Upload Dylib ZIP
        uses: actions/upload-artifact@v4
        with:
          name: LeviLauncher-dylib-${{ steps.version.outputs.version }}
          path: dist/LeviLauncher-${{ steps.version.outputs.version }}-ios.zip
          if-no-files-found: error

      - name: Upload Dylib Binary
        uses: actions/upload-artifact@v4
        with:
          name: LeviLauncher-dylib-binary-${{ steps.version.outputs.version }}
          path: dist/LeviLauncher.dylib
          if-no-files-found: error

      - name: Release to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}-build-${{ github.run_number }}"
          cat > /tmp/release-notes.md <<-EOF
          ## LeviLauncher iOS ${VERSION}

          Pre-built \`.dylib\` for injection into Minecraft: Bedrock Edition.

          **Usage:**
          \`\`\`
          unzip LeviLauncher-${VERSION}-ios.zip
          optool install -c load \\
            -p @executable_path/LeviLauncher.dylib \\
            -t Minecraft.app/Minecraft
          ldid -S Minecraft.app
          \`\`\`

          **Requirements:** Jailbroken device or TrollStore, decrypted Minecraft IPA.
          EOF
          gh release create "$TAG" \
            "dist/LeviLauncher-${VERSION}-ios.zip" \
            --title "LeviLauncher iOS ${VERSION} (build ${{ github.run_number }})" \
            --notes-file /tmp/release-notes.md

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAG_NAME: ${{ github.ref_name }}
          DYLIB_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"🍃 LeviLauncher iOS $DYLIB_VERSION\",
              \"color\": 5814783,
              \"fields\": [
                {\"name\": \"📦 Version\", \"value\": \"\`$TAG_NAME\`\", \"inline\": true},
                {\"name\": \"🍏 Platform\", \"value\": \"iOS (dylib)\", \"inline\": true},
                {\"name\": \"🔗 Workflow\", \"value\": \"[View Run]($RUN_URL)\", \"inline\": false}
              ]
            }]
          }" "$DISCORD_WEBHOOK"
