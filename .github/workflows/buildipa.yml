name: Build Dylib

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/buildipa.yml'
    branches:
      - "**"
    tags:
      - v*
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/buildipa.yml'
  workflow_dispatch:

env:
  PROJECT_DIR: ios
  SCHEME: LeviLauncher
  CONFIGURATION: Release
  SDK: iphoneos

jobs:
  build-dylib:
    name: Build LeviLauncher.dylib
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          cd "$PROJECT_DIR"
          xcodegen generate --spec project.yml
          ls -la *.xcodeproj

      - name: Build Dylib
        run: |
          cd "$PROJECT_DIR"
          xcodebuild -project LeviLauncher.xcodeproj \
                     -scheme "$SCHEME" \
                     -configuration "$CONFIGURATION" \
                     -sdk "$SDK" \
                     -quiet \
                     CODE_SIGNING_ALLOWED=NO \
                     CLANG_ENABLE_MODULE_DEBUGGING=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     build 2>&1

      - name: Locate Built Framework
        id: framework
        run: |
          FRAMEWORK=$(find ~/Library/Developer/Xcode/DerivedData \
                       -name "LeviLauncher.framework" \
                       -path "*/$CONFIGURATION-iphoneos/*" \
                       -type d | head -1)
          if [ -z "$FRAMEWORK" ]; then
            echo "ERROR: Could not find built framework"
            find ~/Library/Developer/Xcode/DerivedData -name "LeviLauncher" -type f 2>/dev/null || true
            exit 1
          fi
          echo "framework-path=$FRAMEWORK" >> "$GITHUB_OUTPUT"
          echo "Found: $FRAMEWORK"
          ls -lh "$FRAMEWORK/"

      - name: Extract Version
        id: version
        run: |
          VERSION=$(cd "$PROJECT_DIR" && \
                    grep "MARKETING_VERSION" project.yml | \
                    head -1 | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION:-1.0.0}" >> "$GITHUB_OUTPUT"

      - name: Package Dylib
        run: |
          mkdir -p dist
          cp -R "${{ steps.framework.outputs.framework-path }}" dist/
          cd dist
          lipo -info LeviLauncher.framework/LeviLauncher
          zip -r "LeviLauncher-${{ steps.version.outputs.version }}-ios.zip" LeviLauncher.framework/
          ls -lh dist/

      - name: Upload Dylib ZIP
        uses: actions/upload-artifact@v4
        with:
          name: LeviLauncher-dylib-${{ steps.version.outputs.version }}
          path: dist/LeviLauncher-${{ steps.version.outputs.version }}-ios.zip
          if-no-files-found: error

      - name: Upload Dylib Framework
        uses: actions/upload-artifact@v4
        with:
          name: LeviLauncher-framework-${{ steps.version.outputs.version }}
          path: dist/LeviLauncher.framework/
          if-no-files-found: error

      - name: Release to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LeviLauncher-${{ steps.version.outputs.version }}-ios.zip
          append_body: true
          body: |
            ## LeviLauncher iOS ${{ steps.version.outputs.version }}

            Pre-built `.dylib` for injection into Minecraft: Bedrock Edition.

            **Usage:**
            ```
            # Extract
            unzip LeviLauncher-${{ steps.version.outputs.version }}-ios.zip

            # Inject into Minecraft.app
            optool install -c load \\
              -p @executable_path/Frameworks/LeviLauncher.framework/LeviLauncher \\
              -t Minecraft.app/Minecraft

            # Re-sign
            ldid -S Minecraft.app
            ```

            **Requirements:** Jailbroken device or TrollStore, decrypted Minecraft IPA.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAG_NAME: ${{ github.ref_name }}
          DYLIB_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"🍃 LeviLauncher iOS $DYLIB_VERSION\",
              \"color\": 5814783,
              \"fields\": [
                {\"name\": \"📦 Version\", \"value\": \"\`$TAG_NAME\`\", \"inline\": true},
                {\"name\": \"🍏 Platform\", \"value\": \"iOS (dylib)\", \"inline\": true},
                {\"name\": \"🔗 Workflow\", \"value\": \"[View Run]($RUN_URL)\", \"inline\": false}
              ]
            }]
          }" "$DISCORD_WEBHOOK"
